version: '3.8'

# Khai báo các ổ đĩa ảo để dữ liệu không bị mất khi tắt máy
volumes:
  postgres_storage:
  n8n_storage:
  ollama_storage:

# Tạo một mạng nội bộ ảo để 3 hệ thống tự nói chuyện với nhau
networks:
  pipeline_network:

services:
  # 1. Hệ quản trị Cơ sở dữ liệu: PostgreSQL
  postgres:
    image: postgres:16
    container_name: core_postgres
    restart: unless-stopped
    environment:
      # Lấy mật khẩu từ file .env
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432" # Mở port để bạn có thể dùng DBeaver/pgAdmin xem data
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    networks:
      - pipeline_network

  # 2. Local LLM Engine: Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: core_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - pipeline_network

  # 3. Workflow Automation: n8n
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: core_n8n
    restart: unless-stopped
    environment:
      - GENERIC_TIMEZONE=${TIMEZONE}
      - TZ=${TIMEZONE}
    ports:
      - "5678:5678"
    volumes:
      - n8n_storage:/home/node/.n8n
    networks:
      - pipeline_network
    depends_on:
      - postgres
      - ollama